<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garaje</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --open: #c8f56a;
      --close: #f56a6a;
      --text: #f0f0f0;
      --muted: #555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(200, 245, 106, 0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: 0.15em;
      color: var(--text);
      line-height: 1;
    }

    .header p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 380px;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.6rem 1.8rem;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      cursor: pointer;
      transition: all 0.2s ease;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .btn-open::before { background: radial-gradient(ellipse at 30% 50%, rgba(200, 245, 106, 0.12), transparent 70%); }
    .btn-close::before { background: radial-gradient(ellipse at 30% 50%, rgba(245, 106, 106, 0.12), transparent 70%); }

    .btn:hover::before, .btn:active::before { opacity: 1; }

    .btn:active { transform: scale(0.98); }

    .btn-open { border-color: rgba(200, 245, 106, 0.2); }
    .btn-close { border-color: rgba(245, 106, 106, 0.2); }

    .btn-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-open .btn-icon { background: rgba(200, 245, 106, 0.1); }
    .btn-close .btn-icon { background: rgba(245, 106, 106, 0.1); }

    .btn-icon svg { width: 22px; height: 22px; }
    .btn-open .btn-icon svg { stroke: var(--open); }
    .btn-close .btn-icon svg { stroke: var(--close); }

    .btn-text {
      text-align: left;
    }

    .btn-label {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      display: block;
    }

    .btn-sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
      display: block;
    }

    .btn-arrow {
      color: var(--muted);
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .btn-open:hover .btn-arrow { color: var(--open); transform: translateX(3px); }
    .btn-close:hover .btn-arrow { color: var(--close); transform: translateX(3px); }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.75rem 1.5rem;
      font-size: 0.8rem;
      color: var(--text);
      letter-spacing: 0.05em;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      opacity: 0;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.success { border-color: rgba(200, 245, 106, 0.4); color: var(--open); }
    #toast.error { border-color: rgba(245, 106, 106, 0.4); color: var(--close); }

    .footer {
      margin-top: 3rem;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Blocked screen */
    #blocked {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      text-align: center;
    }

    #blocked svg {
      stroke: var(--close);
      opacity: 0.6;
    }

    #blocked h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: var(--close);
    }

    #blocked p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="blocked">
    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0110 0v4"/>
    </svg>
    <h2>Acceso denegado</h2>
    <p>Token inválido o ausente</p>
  </div>

  <div id="app">
  <div class="header">
    <h1>Garaje</h1>
    <p>Control de acceso</p>
  </div>

  <div class="buttons">
    <button class="btn btn-open" onclick="sendCommand('turn_on')">
      <div class="btn-left">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
            <polyline points="8 7 12 4 16 7"/>
            <line x1="12" y1="12" x2="12" y2="4"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Abrir puertas</span>
          <span class="btn-sub">Garaje · Acceso principal</span>
        </div>
      </div>
      <svg class="btn-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

    <button class="btn btn-close" onclick="sendCommand('turn_off')">
      <div class="btn-left">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Cerrar puertas</span>
          <span class="btn-sub">Garaje · Acceso principal</span>
        </div>
      </div>
      <svg class="btn-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

  <div class="footer">Casa · Djuarez</div>

  </div> <!-- #app -->

  <div id="toast"></div>

  <script>
    // Token: se lee de la URL la primera vez y se guarda en localStorage
    // Uso inicial: garage.html?token=HA_LONG_LIVED_TOKEN
    // Uso posterior: garage.html (sin parámetros)
    const params     = new URLSearchParams(window.location.search);
    const tokenParam = params.get('token');
    if (tokenParam) localStorage.setItem('ha_token', tokenParam);
    const TOKEN = tokenParam || localStorage.getItem('ha_token');

    const app     = document.getElementById('app');
    const blocked = document.getElementById('blocked');

    if (!TOKEN) {
      app.style.display     = 'none';
      blocked.style.display = 'flex';
    }

    async function sendCommand(action) {
      // action: 'turn_on' | 'turn_off'
      const url = '/api/services/switch/' + action;

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + TOKEN,
          },
          body: JSON.stringify({ entity_id: 'switch.puerta_rampa_state' }),
        });

        if (res.ok) {
          const label = action === 'turn_on' ? 'Abriendo rampa...' : 'Cerrando rampa...';
          showToast(label, 'success');
        } else {
          showToast('Error ' + res.status, 'error');
        }
      } catch (e) {
        showToast('Sin conexión', 'error');
      }
    }

    function showToast(msg, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `show ${type}`;
      setTimeout(() => { toast.className = ''; }, 3000);
    }
  </script>
</body>
</html>
